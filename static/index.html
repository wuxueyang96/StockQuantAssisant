<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM-Driven Quantitative Trading - BTCUSDT Predictions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .prediction-card {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .prediction-item {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .prediction-item h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .prediction-item .value {
            font-size: 2em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .prediction-item .label {
            font-size: 0.8em;
            opacity: 0.8;
        }

        .status-card {
            display: flex;
            justify-content: space-around;
            flex-wrap: wrap;
            gap: 20px;
        }

        .status-item {
            text-align: center;
            padding: 15px;
            background: #f5f5f5;
            border-radius: 10px;
            flex: 1;
            min-width: 150px;
        }

        .status-item .label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 5px;
        }

        .status-item .value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .status-item .value.success {
            color: #10b981;
        }

        .status-item .value.warning {
            color: #f59e0b;
        }

        .button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            width: 100%;
            margin-top: 20px;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .button:active {
            transform: translateY(0);
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
        }

        .timestamp {
            text-align: center;
            color: #666;
            font-size: 0.9em;
            margin-top: 20px;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s ease-in-out infinite;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LLM-Driven Quantitative Trading</h1>
            <p>BTCUSDT Price Prediction System</p>
        </div>

        <div class="card">
            <div class="status-card" id="statusCard">
                <div class="status-item">
                    <div class="label">Data Points</div>
                    <div class="value" id="dataPoints">-</div>
                </div>
                <div class="status-item">
                    <div class="label">Sufficient Data</div>
                    <div class="value" id="sufficientData">-</div>
                </div>
                <div class="status-item">
                    <div class="label">Current Price</div>
                    <div class="value" id="currentPrice">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <h2 style="margin-bottom: 20px; color: #667eea;">Price Predictions (Next 120 Minutes)</h2>
            <div id="predictionContainer">
                <div class="loading">Loading predictions...</div>
            </div>
            <button class="button" onclick="fetchPrediction()">Refresh Prediction</button>
            <div id="errorContainer"></div>
            <div class="timestamp" id="timestamp"></div>
        </div>
    </div>

    <script>
        async function fetchStatus() {
            try {
                const response = await fetch('/api/status');
                const data = await response.json();
                
                document.getElementById('dataPoints').textContent = data.data_points;
                document.getElementById('sufficientData').textContent = data.has_sufficient_data ? '✓ Yes' : '✗ No';
                document.getElementById('sufficientData').className = 'value ' + (data.has_sufficient_data ? 'success' : 'warning');
                
                if (data.latest_price) {
                    document.getElementById('currentPrice').textContent = '$' + data.latest_price.toFixed(2);
                }
            } catch (error) {
                console.error('Error fetching status:', error);
            }
        }

        async function fetchPrediction() {
            const container = document.getElementById('predictionContainer');
            const errorContainer = document.getElementById('errorContainer');
            const timestampEl = document.getElementById('timestamp');
            
            container.innerHTML = '<div class="loading">Loading predictions...</div>';
            errorContainer.innerHTML = '';

            try {
                const response = await fetch('/api/prediction');
                if (!response.ok) {
                    throw new Error('Failed to fetch prediction');
                }
                
                const data = await response.json();
                
                container.innerHTML = `
                    <div class="prediction-card">
                        <div class="prediction-item">
                            <h3>Predicted High</h3>
                            <div class="value">$${data.predicted_high.toFixed(2)}</div>
                            <div class="label">Next 120 minutes</div>
                        </div>
                        <div class="prediction-item">
                            <h3>Predicted Low</h3>
                            <div class="value">$${data.predicted_low.toFixed(2)}</div>
                            <div class="label">Next 120 minutes</div>
                        </div>
                        <div class="prediction-item">
                            <h3>Current Price</h3>
                            <div class="value">$${data.current_price.toFixed(2)}</div>
                            <div class="label">Latest</div>
                        </div>
                        ${data.confidence ? `
                        <div class="prediction-item">
                            <h3>Confidence</h3>
                            <div class="value">${data.confidence.toUpperCase()}</div>
                            <div class="label">Prediction Quality</div>
                        </div>
                        ` : ''}
                    </div>
                `;
                
                if (data.timestamp) {
                    const date = new Date(data.timestamp);
                    timestampEl.textContent = `Last updated: ${date.toLocaleString()}`;
                }
            } catch (error) {
                container.innerHTML = '';
                errorContainer.innerHTML = `<div class="error">Error: ${error.message}. Make sure the server is running and has collected enough data.</div>`;
            }
        }

        // Initial load
        fetchStatus();
        fetchPrediction();

        // Auto-refresh every 60 seconds
        setInterval(() => {
            fetchStatus();
            fetchPrediction();
        }, 60000);
    </script>
</body>
</html>
